<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radha Heart Universe</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#010104;
    font-family:'Noto Sans Devanagari', sans-serif;
}

/* MAIN SCENE */

.scene{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;

    background:
    radial-gradient(circle at top,
    rgba(90,50,180,0.12),
    transparent 40%),

    radial-gradient(circle at bottom,
    rgba(255,190,80,0.05),
    transparent 35%),

    linear-gradient(
    180deg,
    #010104 0%,
    #05030d 40%,
    #020207 100%);
}

/* SOFT GALAXY GLOW */

.nebula{
    position:absolute;

    width:180%;
    height:180%;

    left:-40%;
    top:-40%;

    background:
    radial-gradient(circle,
    rgba(140,80,255,0.06),
    transparent 60%),

    radial-gradient(circle,
    rgba(70,120,255,0.04),
    transparent 65%),

    radial-gradient(circle,
    rgba(255,200,90,0.03),
    transparent 60%);

    filter:blur(120px);

    animation:rotateNebula 60s linear infinite;
}

@keyframes rotateNebula{

    from{
        transform:rotate(0deg) scale(1);
    }

    to{
        transform:rotate(360deg) scale(1.05);
    }
}

/* STARS */

.star{
    position:absolute;

    border-radius:50%;
    background:white;

    opacity:0.4;

    animation:twinkle linear infinite;
}

@keyframes twinkle{

    0%,100%{
        opacity:0.15;
        transform:scale(1);
    }

    50%{
        opacity:0.7;
        transform:scale(1.5);
    }
}

/* FLOATING GOLD PARTICLES */

.particle{
    position:absolute;

    width:2px;
    height:2px;

    border-radius:50%;

    background:#ffd27a;

    box-shadow:
    0 0 6px rgba(255,210,120,0.4);

    opacity:0.4;

    animation:floatParticle linear infinite;
}

@keyframes floatParticle{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-120vh);
    }
}

/* FLOATING RADHA TEXT */

.radha{
    position:absolute;

    color:rgba(245,230,255,0.75);

    white-space:nowrap;
    user-select:none;
    pointer-events:none;

    text-shadow:
    0 0 8px rgba(170,120,255,0.18),
    0 0 14px rgba(255,210,120,0.10);

    filter:blur(0.15px);

    animation:floatUp linear infinite;
}

@keyframes floatUp{

    0%{
        transform:
        translateY(0)
        translateX(0);

        opacity:0;
    }

    10%{
        opacity:0.7;
    }

    100%{
        transform:
        translateY(-120vh)
        translateX(-15px);

        opacity:0;
    }
}

/* HEART OUTLINE */

.heart-word{
    position:absolute;

    color:rgba(248,235,255,0.42);

    font-weight:500;

    white-space:nowrap;
    user-select:none;
    pointer-events:none;

    text-shadow:
    0 0 6px rgba(180,120,255,0.12),
    0 0 10px rgba(255,210,120,0.08);

    animation:heartPulse 6s ease-in-out infinite;
}

/* HEART PULSE */

@keyframes heartPulse{

    0%,100%{
        transform:scale(1);
        opacity:0.38;
    }

    50%{
        transform:scale(1.03);
        opacity:0.55;
    }
}

/* COSMIC FOG */

.fog{
    position:absolute;

    width:200%;
    height:200%;

    background:
    radial-gradient(circle,
    rgba(255,255,255,0.015),
    transparent 60%);

    filter:blur(100px);

    animation:fogMove 80s linear infinite;
}

@keyframes fogMove{

    from{
        transform:translate(-10%,-10%) rotate(0deg);
    }

    to{
        transform:translate(-5%,-5%) rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="scene">

    <div class="nebula"></div>

    <div class="fog"></div>

</div>

<script>

const scene = document.querySelector('.scene');

/* STARS */

for(let i = 0; i < 280; i++){

    const star = document.createElement('div');

    star.classList.add('star');

    const size = Math.random() * 2;

    star.style.width = size + 'px';
    star.style.height = size + 'px';

    star.style.left = Math.random() * 100 + 'vw';
    star.style.top = Math.random() * 100 + 'vh';

    star.style.animationDuration =
    (Math.random() * 5 + 3) + 's';

    star.style.animationDelay =
    Math.random() * 5 + 's';

    scene.appendChild(star);
}

/* GOLD PARTICLES */

for(let i = 0; i < 90; i++){

    const p = document.createElement('div');

    p.classList.add('particle');

    p.style.left =
    Math.random() * 100 + 'vw';

    p.style.top =
    Math.random() * 100 + 'vh';

    p.style.animationDuration =
    (Math.random() * 18 + 14) + 's';

    p.style.animationDelay =
    Math.random() * 10 + 's';

    scene.appendChild(p);
}

/* FLOATING RADHA */

for(let i = 0; i < 180; i++){

    const text = document.createElement('div');

    text.classList.add('radha');

    text.innerHTML = 'राधा';

    text.style.fontSize =
    (Math.random() * 18 + 12) + 'px';

    text.style.left =
    Math.random() * 100 + 'vw';

    text.style.bottom = '-120px';

    text.style.opacity =
    Math.random() * 0.5 + 0.2;

    text.style.animationDuration =
    (Math.random() * 24 + 16) + 's';

    text.style.animationDelay =
    Math.random() * 20 + 's';

    scene.appendChild(text);
}

/* THIN HEART OUTLINE */

const total = 95;

for(let i = 0; i < total; i++){

    const t = (Math.PI * 2 * i) / total;

    /* HEART EQUATION */

    const x =
    16 * Math.pow(Math.sin(t),3);

    const y =
    13 * Math.cos(t)
    - 5 * Math.cos(2*t)
    - 2 * Math.cos(3*t)
    - Math.cos(4*t);

    const word = document.createElement('div');

    word.classList.add('heart-word');

    word.innerHTML = 'राधा';

    /* LARGE THIN HEART */

    const scale = 18;

    const posX =
    window.innerWidth / 2 + x * scale;

    const posY =
    window.innerHeight / 2 - y * scale;

    word.style.left = posX + 'px';

    word.style.top = posY + 'px';

    word.style.fontSize =
    (Math.random() * 4 + 14) + 'px';

    word.style.animationDelay =
    Math.random() * 5 + 's';

    scene.appendChild(word);
}

</script>

</body>
</html>
